CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Dongle connects to TWO peripherals (left + right halves)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Dongle outputs over USB HID; BLE is the link to the halves
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Dongle has no display or encoders
CONFIG_ZMK_DISPLAY=n
CONFIG_EC11=n
